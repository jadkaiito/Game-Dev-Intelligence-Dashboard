<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DevIntel - Market Depth Tool</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        .glass { background: rgba(15, 23, 42, 0.8); border: 1px solid rgba(51, 65, 85, 1); }
        body { background: #020617; color: #e2e8f0; font-family: 'Inter', sans-serif; }
        .accent-text { color: #22d3ee; }
        .card-title { font-size: 0.75rem; font-weight: 700; color: #64748b; text-transform: uppercase; letter-spacing: 0.05em; }
    </style>
</head>
<body class="p-6">

    <div class="max-w-7xl mx-auto flex flex-col lg:flex-row justify-between items-center mb-10 gap-6">
        <div>
            <h1 class="text-4xl font-black tracking-tighter italic">DEV<span class="text-cyan-500">INTEL</span></h1>
            <p class="text-slate-500 text-sm">Market Benchmarking & Genre Deep-Dive</p>
        </div>
        <div class="flex gap-2 w-full lg:w-auto">
            <input id="appId" type="text" placeholder="Enter AppID" class="bg-slate-900 border border-slate-700 p-3 rounded-lg flex-1 lg:w-40 outline-none focus:border-cyan-500">
            <button onclick="analyzeMarket()" class="bg-cyan-600 hover:bg-cyan-400 text-white font-bold px-8 py-3 rounded-lg transition-all shadow-lg shadow-cyan-900/20">Analyze Market</button>
        </div>
    </div>

    <div class="max-w-7xl mx-auto grid grid-cols-1 lg:grid-cols-12 gap-8">
        
        <div class="lg:col-span-4 space-y-6">
            <div id="subjectGame" class="glass rounded-2xl overflow-hidden p-6 hidden">
                <img id="gImg" src="" class="w-full rounded-xl mb-4 grayscale hover:grayscale-0 transition-all duration-700">
                <h2 id="gTitle" class="text-2xl font-bold mb-1"></h2>
                <p id="gGenre" class="text-cyan-500 text-sm font-semibold mb-6 italic"></p>
                
                <div class="grid grid-cols-2 gap-4">
                    <div class="p-4 bg-slate-900/50 rounded-lg border border-slate-800">
                        <p class="card-title">Est. Revenue (Med)</p>
                        <p id="gRev" class="text-xl font-bold text-emerald-400 mt-1">$0</p>
                    </div>
                    <div class="p-4 bg-slate-900/50 rounded-lg border border-slate-800">
                        <p class="card-title">Reviews</p>
                        <p id="gReviews" class="text-xl font-bold text-amber-400 mt-1">0</p>
                    </div>
                </div>
            </div>
        </div>

        <div class="lg:col-span-8 space-y-8">
            <div class="glass rounded-2xl p-8">
                <h3 class="card-title mb-6">Genre Benchmark (Top 10 Sellers)</h3>
                <div class="grid grid-cols-1 md:grid-cols-3 gap-6">
                    <div class="text-center">
                        <p class="text-slate-400 text-xs">Avg. Owners</p>
                        <p id="avgOwners" class="text-3xl font-black text-white italic mt-1">--</p>
                    </div>
                    <div class="text-center border-x border-slate-800">
                        <p class="text-slate-400 text-xs">Avg. Price</p>
                        <p id="avgPrice" class="text-3xl font-black text-white italic mt-1">--</p>
                    </div>
                    <div class="text-center">
                        <p class="text-slate-400 text-xs">Est. Market Ceiling</p>
                        <p id="marketCeiling" class="text-3xl font-black text-cyan-400 italic mt-1">--</p>
                    </div>
                </div>
            </div>

            <div class="glass rounded-2xl p-8">
                <h3 class="card-title mb-6">Market Leaders in this Category</h3>
                <div class="overflow-x-auto">
                    <table class="w-full text-left text-sm">
                        <thead class="text-slate-500 border-b border-slate-800">
                            <tr>
                                <th class="pb-3">Game</th>
                                <th class="pb-3">Est. Owners</th>
                                <th class="pb-3">Price</th>
                                <th class="pb-3 text-right">Revenue Est.</th>
                            </tr>
                        </thead>
                        <tbody id="competitorList" class="divide-y divide-slate-800">
                            </tbody>
                    </table>
                </div>
            </div>
        </div>
    </div>

    <script>
        const proxy = "https://api.allorigins.win/raw?url=";

        async function analyzeMarket() {
            const appId = document.getElementById('appId').value;
            if(!appId) return;

            try {
                // 1. Get Subject Game Details
                const storeRes = await fetch(`${proxy}${encodeURIComponent(`https://store.steampowered.com/api/appdetails?appids=${appId}`)}`);
                const storeData = await storeRes.json();
                const game = storeData[appId].data;
                const genre = game.genres[0].description; // Primary genre

                // 2. Get Top Games in that Genre from SteamSpy
                const genreRes = await fetch(`${proxy}${encodeURIComponent(`https://steamspy.com/api.php?request=genre&genre=${genre.replace(' ', '+')}`)}`);
                const genreData = await genreRes.json();

                updateUI(game, genre, Object.values(genreData).slice(0, 10));
            } catch (err) {
                console.error(err);
                alert("Error fetching depth data. Check AppID.");
            }
        }

        function updateUI(game, genreName, topGames) {
            document.getElementById('subjectGame').classList.remove('hidden');
            document.getElementById('gTitle').innerText = game.name;
            document.getElementById('gGenre').innerText = `Primary Genre: ${genreName}`;
            document.getElementById('gImg').src = game.header_image;
            
            // Calc Subject Revenue
            const reviews = game.recommendations ? game.recommendations.total : 1000;
            const price = game.is_free ? 0 : (game.price_overview ? game.price_overview.final / 100 : 0);
            const medRev = reviews * 45 * price;
            
            document.getElementById('gReviews').innerText = reviews.toLocaleString();
            document.getElementById('gRev').innerText = "$" + Math.floor(medRev).toLocaleString();

            // Market Leader Stats
            let totalOwners = 0;
            let totalPrice = 0;
            const tableBody = document.getElementById('competitorList');
            tableBody.innerHTML = '';

            topGames.forEach(g => {
                const price = g.price ? g.price / 100 : 0;
                // SteamSpy gives owners as a range like "10,000,000 .. 20,000,000"
                const ownerCount = parseInt(g.owners.replace(/,/g, '').split(' .. ')[1]) || 0;
                const rev = ownerCount * price;

                totalOwners += ownerCount;
                totalPrice += price;

                const row = `<tr class="hover:bg-slate-900/50 transition">
                    <td class="py-4 font-bold text-white">${g.name}</td>
                    <td class="py-4 text-slate-400">${g.owners}</td>
                    <td class="py-4 text-slate-400">$${price.toFixed(2)}</td>
                    <td class="py-4 text-emerald-400 font-bold text-right">$${Math.floor(rev).toLocaleString()}</td>
                </tr>`;
                tableBody.insertAdjacentHTML('beforeend', row);
            });

            document.getElementById('avgOwners').innerText = Math.floor(totalOwners / 10).toLocaleString();
            document.getElementById('avgPrice').innerText = "$" + (totalPrice / 10).toFixed(2);
            document.getElementById('marketCeiling').innerText = "$" + Math.floor((totalOwners/10) * (totalPrice/10)).toLocaleString();
        }
    </script>
</body>
</html>
